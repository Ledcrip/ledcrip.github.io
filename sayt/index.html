<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор QR-кодов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Генератор QR-кодов</h1>
        <div class="input-section">
            <input type="url" id="urlInput" placeholder="Введите ссылку для QR-кода" required>
            <button id="generateBtn">Сгенерировать</button>
        </div>
        <div id="qrcode" class="qrcode-display">
            <p>Ваш QR-код появится здесь</p>
        </div>
    </div>

    <!-- Подключение библиотеки qrcode.js для генерации QR-кодов -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode.js/qrcode.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlInput = document.getElementById('urlInput');
            const generateBtn = document.getElementById('generateBtn');
            const qrcodeDiv = document.getElementById('qrcode');
            
            generateBtn.addEventListener('click', () => {
                const url = urlInput.value.trim();

                // Очищаем предыдущий QR-код
                qrcodeDiv.innerHTML = ''; 

                if (url) {
                    // Создаем новый экземпляр QR-кода
                    new QRCode(qrcodeDiv, {
                        text: url,
                        width: 256,
                        height: 256,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H // Уровень коррекции ошибок
                    });
                    qrcodeDiv.style.display = 'flex'; // Убедимся, что контейнер виден и центрирован
                } else {
                    qrcodeDiv.innerHTML = '<p>Пожалуйста, введите ссылку.</p>';
                    qrcodeDiv.style.display = 'flex';
                }
            });
        });
    </script>
</body>
</html>
